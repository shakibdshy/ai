        config_surface: 'Responses API, reasoning effort/summary, service tier, store, prompt caching, structured output via json_schema'
      - name: 'Anthropic adapter'
        package: '@tanstack/ai-anthropic'
        config_surface: 'Extended thinking budget, prompt caching, MCP servers, tool-based structured output'
      - name: 'Gemini adapter'
        package: '@tanstack/ai-gemini'
        config_surface: 'responseMimeType for JSON, thinking, widest modality support (audio/video/document)'
      - name: 'Ollama adapter'
        package: '@tanstack/ai-ollama'
        config_surface: 'Local-only, arbitrary model names, extensive sampling params (mirostat, numa, gpu layers)'
      - name: 'OpenRouter adapter'
        package: '@tanstack/ai-openrouter'
        config_surface: 'Multi-provider routing, web search tool, provider preferences, 300+ models'
      - name: 'Grok adapter'
        package: '@tanstack/ai-grok'
        config_surface: 'OpenAI-compatible API, 2M context, caching support'
      - name: 'Groq adapter'
        package: '@tanstack/ai-groq'
        config_surface: 'Fastest inference, vision, browser search, code execution features'
    reference_candidates:
      - topic: 'Model metadata and supported features per model'
        reason: '>50 models across adapters with distinct capabilities, context windows, and pricing'
      - topic: 'Provider-specific modelOptions'
        reason: 'Each adapter has 10+ unique provider options that differ in naming and behavior'
    failure_modes:
      - mistake: 'Missing @standard-schema/spec makes all types any'
        mechanism: 'Without @standard-schema/spec installed, the entire type system degrades — chat() returns any, tool definitions lose type inference, modelOptions has no type checking. The library core value proposition (type safety) disappears with no warning.'
        wrong_pattern: |
          // package.json has no @standard-schema/spec
          // Everything compiles but all types are 'any'
          const result = chat({ adapter: openaiText('gpt-5.2'), messages })
          // result: any — no type checking at all
        correct_pattern: |
          // pnpm add @standard-schema/spec
          // Full type safety restored
          const result = chat({ adapter: openaiText('gpt-5.2'), messages })
          // result: AsyncIterable<StreamChunk> with full type checking
        source: 'https://github.com/TanStack/ai/issues/235, https://github.com/TanStack/ai/discussions/191'
        priority: 'CRITICAL'
        status: 'active'
        version_context: 'Undocumented peer dependency; #1 first-5-minutes failure for new users'
        skills: ['adapter-configuration', 'tool-calling', 'structured-outputs']

      - mistake: 'Confusing legacy monolithic adapter with tree-shakeable adapter'
        mechanism: 'Both openai() (legacy) and openaiText() (current) exist. Legacy adapters are deprecated but not removed. Using the legacy adapter misses model-specific type safety and tree-shaking benefits.'
        source: 'https://github.com/TanStack/ai/issues/407'
        priority: 'HIGH'
        status: 'active'

      - mistake: 'Ollama adapter silently drops systemPrompts'
        mechanism: 'mapCommonOptionsToOllama() never accesses options.systemPrompts. System prompts passed to chat() with Ollama are silently ignored — no error, no warning.'
        source: 'https://github.com/TanStack/ai/issues/388'
        priority: 'HIGH'
        status: 'active'

      - mistake: 'Anthropic prompt caching fails on system prompts'
        mechanism: 'The Anthropic adapter joins system prompts into a plain string instead of TextBlockParam[], preventing Anthropics cache_control from working. This can cost $1.50-2.00 extra per agentic run.'
        source: 'https://github.com/TanStack/ai/issues/379'
        priority: 'HIGH'
        status: 'active'

      - mistake: 'Wrong API key environment variable name'
        mechanism: 'Each adapter looks for a specific env var: OPENAI_API_KEY, ANTHROPIC_API_KEY, GOOGLE_API_KEY or GEMINI_API_KEY (not GOOGLE_GENAI_API_KEY), XAI_API_KEY (not GROK_API_KEY), GROQ_API_KEY, OPENROUTER_API_KEY, OLLAMA_HOST. Using the wrong name causes silent auth failures.'
        source: 'Source code: adapter env key lookup functions'
        priority: 'MEDIUM'
        status: 'active'

  - name: 'Custom Backend Integration'
    slug: 'custom-backend-integration'
    domain: 'transport-protocol'
    description: 'Connect the client-side useChat hook to a non-TanStack-AI backend through custom connection adapters.'
    type: 'composition'
    packages:
      - '@tanstack/ai-client'
      - '@tanstack/ai-react'
    covers:
      - 'Custom ConnectionAdapter interface'
      - 'ConnectConnectionAdapter vs SubscribeConnectionAdapter'
      - 'fetchServerSentEvents() customization'
      - 'fetchHttpStream() customization'
    tasks:
      - 'Connect useChat to a custom backend that speaks SSE'
      - 'Connect useChat to a custom backend with NDJSON streaming'
      - 'Implement a fully custom connection adapter'
      - 'Add authentication headers to connection requests'
    failure_modes:
      - mistake: 'Providing both connect and subscribe+send in connection adapter'
        mechanism: 'The ConnectionAdapter interface has two mutually exclusive modes. Providing both throws: "Connection adapter must provide either connect or both subscribe and send, not both modes".'
        source: 'Source code assertion: ai-client/src/connection-adapters.ts line 116'
        priority: 'HIGH'
        status: 'active'

      - mistake: 'Not handling SSE browser connection limits'
        mechanism: 'Browsers limit SSE connections to 6-8 per domain. Opening multiple chat sessions on the same page can exhaust this limit, causing new connections to queue indefinitely.'
        source: 'docs/chat/connection-adapters.md'
        priority: 'MEDIUM'
        status: 'active'

      - mistake: 'Using HTTP stream without implementing reconnection'
        mechanism: 'SSE has built-in browser auto-reconnection, but HTTP stream (NDJSON) does not. Connection drops with HTTP stream silently lose the response without retrying.'
        source: 'docs/protocol/http-stream-protocol.md'
        priority: 'MEDIUM'
        status: 'active'

  - name: 'AG-UI Protocol'
    slug: 'ag-ui-protocol'
    domain: 'transport-protocol'
    description: 'Implement the AG-UI streaming protocol server-side without using client packages — for backends that serve AG-UI events to any compatible frontend.'
    type: 'core'
    packages:
      - '@tanstack/ai'
    covers:
      - 'StreamChunk / AG-UI event types'
      - 'RUN_STARTED, TEXT_MESSAGE_START/CONTENT/END, TOOL_CALL_START/ARGS/END, RUN_FINISHED, RUN_ERROR'
      - 'STEP_STARTED/STEP_FINISHED (thinking)'
      - 'STATE_SNAPSHOT/STATE_DELTA'
      - 'CUSTOM events'
      - 'toServerSentEventsStream()'
      - 'toHttpStream()'
    tasks:
      - 'Build a server that emits AG-UI protocol events'
      - 'Choose between SSE and HTTP stream transport format'
      - 'Handle tool calls within the AG-UI event lifecycle'
      - 'Emit custom events for application-specific data'
    failure_modes:
      - mistake: 'TanStack AI message format doesnt match AG-UI spec'
        mechanism: 'TanStack AIs internal request format (messages with parts containing content) diverges from the AG-UI spec (messages with content as string/InputContent, plus threadId, runId, tools, context, forwardedProps). Clients expecting strict AG-UI compliance will fail.'
        source: 'https://github.com/TanStack/ai/issues/311'
        priority: 'HIGH'
        status: 'active'

      - mistake: 'Proxy buffering breaks SSE streaming'
        mechanism: 'Reverse proxies (nginx, Cloudflare, etc.) may buffer SSE responses, delaying or batching events. Must set X-Accel-Buffering: no or equivalent proxy headers.'
        source: 'docs/protocol/sse-protocol.md'
        priority: 'MEDIUM'
        status: 'active'

      - mistake: 'Assuming all AG-UI events arrive in every response'
        mechanism: 'Not all events are guaranteed. STEP_STARTED/STEP_FINISHED only appear with thinking-enabled models. TOOL_CALL events only appear when tools are called. Code that expects a fixed event sequence will break.'
        source: 'docs/protocol/chunk-definitions.md'
        priority: 'MEDIUM'
        status: 'active'

  - name: 'Middleware'
    slug: 'middleware'
    domain: 'extensibility'
    description: 'Intercept the chat lifecycle with middleware hooks for analytics, event firing, tool caching, and custom cross-cutting concerns.'
    type: 'core'
    packages:
      - '@tanstack/ai'
    covers:
      - 'middleware array in chat() config'
      - 'Hooks: onConfig, onStart, onChunk, onBeforeToolCall, onAfterToolCall, onUsage, onFinish, onAbort, onError'
      - 'toolCacheMiddleware'
      - 'Middleware execution order (left-to-right)'
    tasks:
      - 'Add analytics tracking to chat completions'
      - 'Fire events at the end of a stream'
      - 'Cache tool call results with TTL'
      - 'Implement custom logging or tracing'
      - 'Add rate limiting or request validation'
    failure_modes:
      - mistake: 'Structured output request runs outside middleware pipeline'
        mechanism: 'When using chat({ outputSchema }), the final structured output request to the provider executes outside the middleware chain. Observability/tracing middleware will miss this call.'
        source: 'https://github.com/TanStack/ai/issues/390'
        priority: 'HIGH'
        status: 'active'

      - mistake: 'Trying to modify StreamChunks in middleware'
        mechanism: 'Middleware hooks provide read-only access to stream chunks via onChunk. They cannot modify, filter, or transform chunks after emission. Attempting to mutate chunk objects has no effect.'
        source: 'docs/advanced/middleware.md'
        priority: 'MEDIUM'
        status: 'active'

      - mistake: 'Middleware exceptions breaking the stream'
        mechanism: 'Unhandled exceptions in middleware hooks propagate up and break the streaming response. All middleware hooks should be wrapped in try-catch to prevent analytics/logging failures from killing the chat stream.'
        source: 'docs/advanced/middleware.md'
        priority: 'MEDIUM'
        status: 'active'

tensions:
  - name: 'Type safety vs. quick prototyping'
    skills: ['adapter-configuration', 'chat-experience']
    description: 'Per-model type safety requires explicit adapter creation, @standard-schema/spec installation, and specific model string literals. Quick prototyping wants dynamic model selection and minimal setup.'
    implication: 'Agents optimizing for quick setup will skip @standard-schema/spec and use string variables for model names, silently losing all type safety — the librarys core value proposition.'

  - name: 'Tree-shaking vs. API discoverability'
    skills: ['adapter-configuration', 'chat-experience', 'media-generation']
    description: 'Split adapters (openaiText, openaiImage, openaiSpeech) minimize bundle size but require developers to know the exact import path for each activity.'
    implication: 'Agents default to importing from the package root or using wildcard imports, pulling in the entire adapter bundle and defeating tree-shaking.'

  - name: 'Server/client tool symmetry vs. state consistency'
    skills: ['tool-calling', 'chat-experience']
    description: 'Tools can execute on server or client, but server tool results have different UIMessage state (input-complete with no output) than client tools (complete with output).'
    implication: 'Agents building tool rendering UI will write code that checks part.output, which works for client tools but fails silently for server tools.'

  - name: 'AG-UI protocol compliance vs. internal message format'
    skills: ['ag-ui-protocol', 'custom-backend-integration']
    description: 'TanStack AIs internal UIMessage format (parts-based) diverges from the AG-UI spec (content-based). Full AG-UI compliance would require a different message structure.'
    implication: 'Agents building AG-UI compatible servers will use TanStack AIs message format, which breaks interop with other AG-UI clients expecting the standard format.'

