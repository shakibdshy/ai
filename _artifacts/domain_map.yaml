skills:
  - name: 'Chat Experience'
    slug: 'chat-experience'
    domain: 'chat-experiences'
    description: 'Implement an end-to-end chatbot: server endpoint with streaming response, client-side UI with useChat, message rendering, multimodal content, and thinking/reasoning display.'
    type: 'core'
    packages:
      - '@tanstack/ai'
      - '@tanstack/ai-client'
      - '@tanstack/ai-react'
      - '@tanstack/ai-solid'
      - '@tanstack/ai-vue'
      - '@tanstack/ai-svelte'
      - '@tanstack/ai-preact'
    covers:
      - 'chat()'
      - 'toServerSentEventsResponse()'
      - 'toServerSentEventsStream()'
      - 'toHttpResponse()'
      - 'toHttpStream()'
      - 'useChat()'
      - 'ChatClient'
      - 'fetchServerSentEvents()'
      - 'fetchHttpStream()'
      - 'UIMessage'
      - 'ModelMessage'
      - 'ContentPart (text, image, audio, video, document)'
      - 'ThinkingPart'
      - 'StreamChunk / AG-UI events'
      - 'convertMessagesToModelMessages()'
      - 'uiMessageToModelMessages()'
      - 'modelMessagesToUIMessages()'
    tasks:
      - 'Set up a server-side chat endpoint that streams responses'
      - 'Build a React/Solid/Vue/Svelte chat UI with useChat'
      - 'Render assistant messages with thinking/reasoning content'
      - 'Send multimodal content (images, audio, video, documents) in messages'
      - 'Handle streaming states (loading, error, ready) in the UI'
      - 'Convert between UIMessage and ModelMessage formats'
    failure_modes:
      - mistake: 'Using monolithic openai() instead of openaiText()'
        mechanism: 'The legacy monolithic adapter (openai(), anthropic()) is deprecated. The new tree-shakeable adapters (openaiText, anthropicText) take the model name as an argument and are the correct API.'
        wrong_pattern: |
          import { openai } from '@tanstack/ai-openai'
          const stream = chat({ adapter: openai(), model: 'gpt-5.2', messages })
        correct_pattern: |
          import { openaiText } from '@tanstack/ai-openai'
          const stream = chat({ adapter: openaiText('gpt-5.2'), messages })
        source: 'docs/migration/migration.md'
        priority: 'CRITICAL'
        status: 'active'
        version_context: 'Changed in v0.5.0; agents trained on older code will produce the monolithic pattern'

      - mistake: 'Using toResponseStream instead of toServerSentEventsResponse'
        mechanism: 'toResponseStream was renamed to toServerSentEventsResponse (returns a Response) or toServerSentEventsStream (returns a ReadableStream). The old name no longer exists.'
        wrong_pattern: |
          import { toResponseStream } from '@tanstack/ai'
          return toResponseStream(stream, { abortController })
        correct_pattern: |
          import { toServerSentEventsResponse } from '@tanstack/ai'
          return toServerSentEventsResponse(stream)
        source: 'docs/migration/migration.md'
        priority: 'HIGH'
        status: 'active'
        version_context: 'Renamed in v0.5.0'

      - mistake: 'Passing model as separate parameter to chat()'
        mechanism: 'Model name is now passed to the adapter factory function, not as a separate parameter to chat(). Passing model to chat() is silently ignored.'
        wrong_pattern: |
          const stream = chat({
            adapter: openaiText(),
            model: 'gpt-5.2',
            messages,
          })
        correct_pattern: |
          const stream = chat({
            adapter: openaiText('gpt-5.2'),
            messages,
          })
        source: 'docs/migration/migration.md'
        priority: 'HIGH'
        status: 'active'
        version_context: 'Changed in v0.5.0'

      - mistake: 'Nesting temperature/maxTokens in options object'
        mechanism: 'Common options (temperature, topP, maxTokens) are now flattened at the top level of the chat config, not nested under an options key.'
        wrong_pattern: |
          chat({
            adapter: openaiText('gpt-5.2'),
            messages,
            options: { temperature: 0.7, maxTokens: 1000 },
          })
        correct_pattern: |
          chat({
            adapter: openaiText('gpt-5.2'),
            messages,
            temperature: 0.7,
            maxTokens: 1000,
          })
        source: 'docs/migration/migration.md'
        priority: 'HIGH'
        status: 'active'
        version_context: 'Changed in v0.5.0'

      - mistake: 'Using providerOptions instead of modelOptions'
        mechanism: 'The providerOptions parameter was renamed to modelOptions. Using the old name is silently ignored — provider-specific options will not be applied.'
        wrong_pattern: |
          chat({
            adapter: openaiText('gpt-5.2'),
            messages,
            providerOptions: { responseFormat: { type: 'json_object' } },
          })
        correct_pattern: |
          chat({
            adapter: openaiText('gpt-5.2'),
            messages,
            modelOptions: { responseFormat: { type: 'json_object' } },
          })
        source: 'docs/migration/migration.md'
        priority: 'HIGH'
        status: 'active'
        version_context: 'Renamed in v0.5.0'

      - mistake: 'Not handling RUN_ERROR events in streaming context'
        mechanism: 'Streaming errors do not throw — they arrive as RUN_ERROR events. If the client does not explicitly subscribe to and handle these events, errors are silently lost and the UI appears to hang.'
        source: 'docs/chat/streaming.md'
        priority: 'MEDIUM'
        status: 'active'

      - mistake: 'Using Vercel AI SDK patterns (streamText, generateText)'
        mechanism: 'Agents frequently generate Vercel AI SDK code instead of TanStack AI code. streamText() and generateText() do not exist — the correct function is chat(). This is the most common AI-agent confusion pattern.'
        wrong_pattern: |
          import { streamText } from 'ai'
          import { openai } from '@ai-sdk/openai'
          const result = streamText({ model: openai('gpt-4o'), messages })
        correct_pattern: |
          import { chat } from '@tanstack/ai'
          import { openaiText } from '@tanstack/ai-openai'
          const stream = chat({ adapter: openaiText('gpt-5.2'), messages })
        source: 'maintainer interview'
        priority: 'CRITICAL'
        status: 'active'
        version_context: 'Vercel AI SDK patterns dominate agent training data; agents default to these'

      - mistake: 'Using Vercel createOpenAI() provider pattern'
        mechanism: 'Agents generate createOpenAI() or similar Vercel provider factory patterns. TanStack AI uses openaiText(model) adapter factories instead.'
        wrong_pattern: |
          import { createOpenAI } from '@ai-sdk/openai'
          const openai = createOpenAI({ apiKey: process.env.OPENAI_API_KEY })
          streamText({ model: openai('gpt-4o'), messages })
        correct_pattern: |
          import { openaiText } from '@tanstack/ai-openai'
          import { chat } from '@tanstack/ai'
          chat({ adapter: openaiText('gpt-5.2'), messages })
        source: 'maintainer interview'
        priority: 'CRITICAL'
        status: 'active'
        version_context: 'createOpenAI/createAnthropic patterns from Vercel AI SDK are widespread in training data'

      - mistake: 'Implementing custom SSE stream instead of using toServerSentEventsResponse'
        mechanism: 'Agents often write manual SSE formatting (writing "data: " prefixes, handling encoding, setting headers) instead of using the built-in toServerSentEventsResponse() or toServerSentEventsStream() utilities. The manual implementation is error-prone and misses edge cases.'
        wrong_pattern: |
          const encoder = new TextEncoder()
          const stream = new ReadableStream({
            async start(controller) {
              for await (const chunk of chatStream) {
                controller.enqueue(encoder.encode(`data: ${JSON.stringify(chunk)}\n\n`))
              }
              controller.close()
            }
          })
          return new Response(stream, { headers: { 'Content-Type': 'text/event-stream' } })
        correct_pattern: |
          import { chat, toServerSentEventsResponse } from '@tanstack/ai'
          const stream = chat({ adapter: openaiText('gpt-5.2'), messages })
          return toServerSentEventsResponse(stream)
        source: 'maintainer interview'
        priority: 'HIGH'
        status: 'active'

      - mistake: 'Implementing custom onEnd/onFinish callbacks instead of middleware'
        mechanism: 'Agents try to add onEnd, onFinish, or onComplete callback options to chat() or useChat(). These do not exist. The correct pattern is to use middleware hooks (onFinish, onUsage, onError) for post-stream lifecycle events.'
        wrong_pattern: |
          chat({
            adapter: openaiText('gpt-5.2'),
            messages,
            onEnd: (result) => { trackAnalytics(result) },
            onFinish: (result) => { saveToDatabase(result) },
          })
        correct_pattern: |
          chat({
            adapter: openaiText('gpt-5.2'),
            messages,
            middleware: [{
              onFinish: (ctx) => { trackAnalytics(ctx) },
              onUsage: (ctx) => { saveToDatabase(ctx) },
            }],
          })
        source: 'maintainer interview'
        priority: 'HIGH'
        status: 'active'
        skills: ['chat-experience', 'middleware']

      - mistake: 'Importing from @tanstack/ai-client instead of framework package'
        mechanism: 'The core @tanstack/ai-client package is headless and re-exported by framework packages (@tanstack/ai-react, ai-solid, etc.). Agents should import from the framework package so developers dont need to install both. Only import from @tanstack/ai-client for vanilla JS.'
        wrong_pattern: |
          import { fetchServerSentEvents } from '@tanstack/ai-client'
          import { useChat } from '@tanstack/ai-react'
        correct_pattern: |
          import { useChat, fetchServerSentEvents } from '@tanstack/ai-react'
        source: 'maintainer interview'
        priority: 'HIGH'
        status: 'active'

  - name: 'Tool Calling'
    slug: 'tool-calling'
    domain: 'tool-system'
    description: 'Define isomorphic tools with toolDefinition(), implement server and client execution, set up approval flows, use lazy tool discovery, and render tool results in the UI.'
    type: 'core'
    packages:
      - '@tanstack/ai'
      - '@tanstack/ai-client'
      - '@tanstack/ai-react'
    covers:
      - 'toolDefinition()'
      - '.server()'
      - '.client()'
      - 'clientTools()'
      - 'needsApproval'
      - 'addToolApprovalResponse()'
      - 'lazy: true'
      - 'ToolCallManager'
      - 'ToolCallPart / ToolResultPart'
      - 'createChatClientOptions()'
      - 'InferChatMessages'
    tasks:
      - 'Define a tool with toolDefinition() and Zod schemas'
      - 'Add server-side tool execution with .server()'
      - 'Add client-side tool execution with .client()'
      - 'Build tools that execute on both server and client'
      - 'Implement tool approval UI for sensitive operations'
      - 'Use lazy tool discovery to reduce token usage'
      - 'Render tool call progress and results in chat UI'
      - 'Pass tool definitions to both server chat() and client useChat()'
    failure_modes:
      - mistake: 'Missing @standard-schema/spec causes tool types to be unknown'
        mechanism: 'Without the @standard-schema/spec package installed, Zod schema inference in toolDefinition() breaks silently — input types become unknown in .server() and .client() callbacks. This is an undocumented peer dependency.'
        wrong_pattern: |
          // package.json missing @standard-schema/spec
          const tool = toolDefinition({
            name: 'getTodos',
            inputSchema: z.object({ userId: z.string() }),
          })
          // .server() callback input is typed as unknown
          const serverTool = tool.server(async (input) => { /* input: unknown */ })
        correct_pattern: |
          // pnpm add @standard-schema/spec
          const tool = toolDefinition({
            name: 'getTodos',
            inputSchema: z.object({ userId: z.string() }),
          })
          // .server() callback input is correctly typed
          const serverTool = tool.server(async ({ userId }) => { /* userId: string */ })
        source: 'https://github.com/TanStack/ai/issues/235'
        priority: 'CRITICAL'
        status: 'active'
        version_context: 'Undocumented peer dependency; multiple users hit this independently'

      - mistake: 'Not passing tool definitions to both server and client'
        mechanism: 'Server tools need the definition on the server (in chat()), and client tools need the definition on the client (in useChat/clientTools). Forgetting either side causes the tool to not execute or not render.'
        wrong_pattern: |
          // Server only — client can't render tool results
          chat({ adapter, messages, tools: [getProducts] })
          // Client has no tool definitions
          useChat({ connection: fetchServerSentEvents('/api/chat') })
        correct_pattern: |
          // Server
          chat({ adapter, messages, tools: [getProducts] })
          // Client also receives tool definitions for rendering
          useChat({
            connection: fetchServerSentEvents('/api/chat'),
            clientTools: clientTools([getProductsDef.client()]),
          })
        source: 'docs/tools/tools.md, maintainer interview'
        priority: 'HIGH'
        status: 'active'

      - mistake: 'Multiple client tools stall in same round'
        mechanism: 'Race condition in drainPostStreamActions() where nested drain calls steal queued actions, permanently stalling conversations when the LLM calls multiple client tools in a single round.'
        source: 'https://github.com/TanStack/ai/issues/302'
        priority: 'HIGH'
        status: 'active'
        version_context: 'Known bug; community patch exists but no official fix'

      - mistake: 'Server tool output missing from UIMessage parts'
        mechanism: 'Server-executed tools show state "input-complete" with no output field in the UIMessage ToolCallPart, while client tools show state "complete" with output. Code that checks part.output for server tools will get undefined.'
        source: 'https://github.com/TanStack/ai/issues/176'
        priority: 'HIGH'
        status: 'active'

      - mistake: 'Anthropic adapter passes null tool input, stalling agent loops'
        mechanism: 'When Anthropic produces an empty tool_use block, JSON.parse("null") returns null instead of {}, failing Zod validation and silently killing the conversation.'
        source: 'https://github.com/TanStack/ai/issues/265'
        priority: 'HIGH'
        status: 'active'
        skills: ['tool-calling', 'adapter-configuration']

      - mistake: 'Tool results always stringified, blocking multimodal responses'
        mechanism: 'JSON.stringify() is applied at three locations in the tool result pipeline, forcing all tool results to strings. This blocks image-returning tools with providers that support multimodal tool responses (e.g., OpenAI Responses API).'
        source: 'https://github.com/TanStack/ai/issues/363'
        priority: 'MEDIUM'
        status: 'active'

