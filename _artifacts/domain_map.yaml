    failure_modes:
      - mistake: 'Using removed embedding() function'
        mechanism: 'Embeddings support was removed from TanStack AI. Use your vector database built-in embedding support or call the provider SDK directly.'
        wrong_pattern: |
          import { embedding } from '@tanstack/ai'
          import { openaiEmbed } from '@tanstack/ai-openai'
          const result = await embedding({ adapter: openaiEmbed(), model: 'text-embedding-3-small', input: 'Hello' })
        correct_pattern: |
          import OpenAI from 'openai'
          const openai = new OpenAI({ apiKey: process.env.OPENAI_API_KEY })
          const result = await openai.embeddings.create({ model: 'text-embedding-3-small', input: 'Hello' })
        source: 'docs/migration/migration.md'
        priority: 'HIGH'
        status: 'removed'
        version_context: 'Removed in v0.5.0; agents trained on pre-removal code will still generate this'

      - mistake: 'Not downloading OpenAI image URLs before they expire'
        mechanism: 'OpenAI image generation URLs expire after 1 hour. If the URL is stored or displayed without downloading the image data, it will break silently after expiration.'
        source: 'docs/media/image-generation.md'
        priority: 'MEDIUM'
        status: 'active'

      - mistake: 'Using stream:true for activities that do not support streaming'
        mechanism: 'Not all generation activities support streaming (e.g., some models require polling for video). Using stream:true on unsupported activities may hang or return no progress events.'
        source: 'docs/media/generations.md'
        priority: 'MEDIUM'
        status: 'active'

      - mistake: 'Forgetting toServerSentEventsResponse when using TanStack Start server functions'
        mechanism: 'When using generation hooks with TanStack Start server functions, the stream must be wrapped with toServerSentEventsResponse(). Without it, the server function returns raw data instead of a streamable SSE response. This is the key integration step that cannot be skipped.'
        source: 'maintainer interview'
        priority: 'HIGH'
        status: 'active'

  - name: 'Code Mode'
    slug: 'code-mode'
    domain: 'code-execution'
    description: 'Set up LLM-generated TypeScript execution in sandboxed environments with isolate drivers, skills system, and client-side progress display.'
    type: 'core'
    packages:
      - '@tanstack/ai-code-mode'
      - '@tanstack/ai-code-mode-skills'
      - '@tanstack/ai-isolate-node'
      - '@tanstack/ai-isolate-quickjs'
      - '@tanstack/ai-isolate-cloudflare'
    covers:
      - 'createCodeModeTool()'
      - 'createCodeModeSystemPrompt()'
      - 'codeModeWithSkills()'
      - 'createNodeIsolateDriver()'
      - 'createQuickJSIsolateDriver()'
      - 'createCloudflareIsolateDriver()'
      - 'Trust strategies (ask, auto, none)'
      - 'SkillStorage (FileSystem, LocalStorage, InMemory, Mongo)'
      - 'Custom events: code_mode:execution_started, code_mode:console, code_mode:external_call'
    tasks:
      - 'Set up Code Mode with an isolate driver'
      - 'Add tools that are callable from within generated code'
      - 'Implement persistent skill storage for reusable code patterns'
      - 'Display code execution progress in the client UI'
      - 'Choose between Node, QuickJS, and Cloudflare isolate drivers'
    subsystems:
      - name: 'Node.js isolated-vm driver'
        package: '@tanstack/ai-isolate-node'
        config_surface: 'memoryLimit (128MB default), timeout (30s), skipProbe, requires native module compilation'
      - name: 'QuickJS WASM driver'
        package: '@tanstack/ai-isolate-quickjs'
        config_surface: 'memoryLimit (128MB), timeout (30s), maxStackSize (512KB), universal but limited stdlib'
      - name: 'Cloudflare Workers driver'
        package: '@tanstack/ai-isolate-cloudflare'
        config_surface: 'workerUrl (required), authorization, timeout (30s), maxToolRounds (10), client-server execution model'
    failure_modes:
      - mistake: 'Passing API keys or secrets to the sandbox environment'
        mechanism: 'Code Mode executes LLM-generated code. Any secrets passed into the sandbox context are accessible to generated code, which could exfiltrate them via tool calls or network access.'
        source: 'docs/code-mode/code-mode.md'
        priority: 'CRITICAL'
        status: 'active'

      - mistake: 'Not setting timeout for code execution'
        mechanism: 'LLM-generated code may contain infinite loops. Without a timeout, execution hangs indefinitely. The default timeout is 30s, but developers may override it to 0 or remove it.'
        source: 'packages/typescript/ai-code-mode/src/'
        priority: 'HIGH'
        status: 'active'

      - mistake: 'Using Node isolated-vm driver without checking platform compatibility'
        mechanism: 'isolated-vm requires native module compilation. On incompatible platforms (wrong Node version, missing build tools), it causes segfaults. The driver has a probe mechanism (probeIsolatedVm()) but skipProbe:true bypasses it.'
        source: 'packages/typescript/ai-isolate-node/src/'
        priority: 'HIGH'
        status: 'active'

      - mistake: 'Expecting identical behavior across isolate drivers'
        mechanism: 'Node driver has full V8 support, QuickJS has limited stdlib (no File I/O, limited async), Cloudflare has network latency per tool call and a maxToolRounds limit (default 10). Same code may work in Node but fail in QuickJS or hit round limits on Cloudflare.'
        source: 'docs/code-mode/code-mode-isolates.md'
        priority: 'MEDIUM'
        status: 'active'

  - name: 'Structured Outputs'
    slug: 'structured-outputs'
    domain: 'chat-experiences'
    description: 'Get type-safe JSON responses from the LLM using schema constraints with Zod, ArkType, or Valibot. Just pass outputSchema to chat() — the adapter handles provider differences transparently.'
    type: 'core'
    packages:
      - '@tanstack/ai'
    covers:
      - 'outputSchema parameter in chat()'
      - 'convertSchemaToJsonSchema()'
      - 'Zod, ArkType, Valibot schema support'
    tasks:
      - 'Extract typed data from LLM responses using outputSchema on chat()'
      - 'Use Zod schemas for structured output validation'
    failure_modes:
      - mistake: 'Trying to implement provider-specific structured output strategies'
        mechanism: 'Agents try to manually configure provider-specific structured output (e.g., setting response_format for OpenAI, forcing tool calls for Anthropic, setting responseMimeType for Gemini). The correct approach is to just pass outputSchema to chat() — the adapter handles everything transparently. There is no scenario where the developer needs to know the provider strategy.'
        wrong_pattern: |
          chat({
            adapter: openaiText('gpt-5.2'),
            messages,
            modelOptions: { responseFormat: { type: 'json_schema', json_schema: mySchema } },
          })
        correct_pattern: |
          chat({
            adapter: openaiText('gpt-5.2'),
            messages,
            outputSchema: z.object({ name: z.string(), age: z.number() }),
          })
        source: 'maintainer interview'
        priority: 'HIGH'
        status: 'active'

      - mistake: 'Using convertSchemaToJsonSchema with ArkType'
        mechanism: 'convertSchemaToJsonSchema() is broken for ArkType schemas, producing incorrect JSON Schema output. Zod works correctly; other schema libraries may have similar issues.'
        source: 'https://github.com/TanStack/ai/issues/276'
        priority: 'MEDIUM'
        status: 'active'

      - mistake: 'Missing required array in OpenAI structured output schema'
        mechanism: 'OpenAI structured outputs require all properties in the required array and additionalProperties: false. Schemas that dont meet this constraint fail silently or produce validation errors.'
        source: 'Source code: openai adapter structured output transformation'
        priority: 'MEDIUM'
        status: 'active'

